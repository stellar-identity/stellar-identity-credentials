name: TypeScript CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  typescript-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build SDK
        run: npm run build

      - name: Install UI dependencies
        run: cd ui && npm install

      - name: Build UI
        run: cd ui && npm run build

      - name: Run SDK tests with coverage
        run: npm test -- --coverage --coverageThreshold='{"global":{"branches":80,"functions":80,"lines":80,"statements":80}}'

      - name: Run UI tests with coverage
        run: cd ui && npx jest --coverage --coverageThreshold='{"global":{"branches":80,"functions":80,"lines":80,"statements":80}}'

      - name: Lint
        run: |
          npm run lint
          cd ui && npm run lint

      - name: Install Prettier
        run: npm install -g prettier

      - name: Format check
        run: prettier --check 'sdk/src/**/*.ts' 'ui/src/**/*.{ts,tsx}'

      - name: Type check SDK
        run: npx tsc --noEmit

      - name: Type check UI
        run: cd ui && npx tsc --noEmit

      - name: Bundle size analysis
        run: |
          echo "Bundle size analysis:"
          echo "SDK dist:"
          du -sh dist/ 2>/dev/null || echo "SDK dist not found"
          echo "UI dist:"
          du -sh ui/dist/ 2>/dev/null || echo "UI dist not found"

      - name: NPM dry-run publish
        run: npm publish --dry-run
