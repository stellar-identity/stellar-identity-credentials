name: Code Quality Gates

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  # Coverage thresholds (percent)
  COVERAGE_CONTRACTS: 80
  COVERAGE_SDK: 80
  COVERAGE_UI: 75
  # Complexity / length limits
  MAX_COMPLEXITY: 15
  MAX_LINES_CONTRACT: 100
  MAX_LINES_SDK_UI: 80
  MAX_FILE_LINES_CONTRACT: 500
  MAX_FILE_LINES_SDK_UI: 300

jobs:
  sdk-coverage:
    name: SDK Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run SDK tests with coverage
        run: npx jest --coverage --coverageDirectory=coverage/sdk --passWithNoTests 2>&1 || true

      - name: Check SDK coverage threshold
        run: |
          python3 << 'EOF'
          import json, os, sys

          summary_path = 'coverage/sdk/coverage-summary.json'
          threshold = float(os.environ.get('COVERAGE_SDK', 80))

          try:
              with open(summary_path) as f:
                  data = json.load(f)
              total = data.get('total', {})
              lines_pct = total.get('lines', {}).get('pct', 0)
              print(f"SDK line coverage: {lines_pct:.1f}% (threshold: {threshold}%)")
              if lines_pct < threshold:
                  print(f"::error::SDK coverage {lines_pct:.1f}% is below {threshold}% threshold")
                  sys.exit(1)
          except FileNotFoundError:
              print("::warning::Coverage report not found — skipping threshold check")
          EOF

      - name: Upload SDK coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-sdk
          path: coverage/sdk/
          retention-days: 30

  ui-coverage:
    name: UI Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install UI dependencies
        run: |
          cd ui
          npm ci --ignore-scripts

      - name: Run UI tests with coverage
        run: |
          cd ui
          npx jest --coverage --coverageDirectory=../coverage/ui --passWithNoTests 2>&1 || true

      - name: Check UI coverage threshold
        run: |
          python3 << 'EOF'
          import json, os, sys

          summary_path = 'coverage/ui/coverage-summary.json'
          threshold = float(os.environ.get('COVERAGE_UI', 75))

          try:
              with open(summary_path) as f:
                  data = json.load(f)
              total = data.get('total', {})
              lines_pct = total.get('lines', {}).get('pct', 0)
              print(f"UI line coverage: {lines_pct:.1f}% (threshold: {threshold}%)")
              if lines_pct < threshold:
                  print(f"::error::UI coverage {lines_pct:.1f}% is below {threshold}% threshold")
                  sys.exit(1)
          except FileNotFoundError:
              print("::warning::Coverage report not found — skipping threshold check")
          EOF

      - name: Upload UI coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-ui
          path: coverage/ui/
          retention-days: 30

  complexity-check:
    name: Complexity & Length Limits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install complexity tools
        run: npm install -g typescript-complexity 2>/dev/null || true

      - name: Check TypeScript/JavaScript complexity
        run: |
          python3 << 'EOF'
          import os, re, sys

          MAX_COMPLEXITY = int(os.environ.get('MAX_COMPLEXITY', 15))
          MAX_LINES_SDK_UI = int(os.environ.get('MAX_LINES_SDK_UI', 80))
          MAX_FILE_LINES_SDK_UI = int(os.environ.get('MAX_FILE_LINES_SDK_UI', 300))

          violations = []

          def count_complexity(content):
              """Approximate cyclomatic complexity by counting decision points."""
              keywords = ['if ', 'else if', 'for ', 'while ', 'case ', 'catch ', '&& ', '|| ', '? ']
              return 1 + sum(content.count(kw) for kw in keywords)

          def check_ts_file(path):
              with open(path, encoding='utf-8', errors='ignore') as f:
                  content = f.read()
              lines = content.splitlines()

              # File length check
              if len(lines) > MAX_FILE_LINES_SDK_UI:
                  violations.append(f"{path}: file has {len(lines)} lines (max {MAX_FILE_LINES_SDK_UI})")

              # Function length check (rough heuristic)
              func_pattern = re.compile(
                  r'(?:function\s+\w+|(?:async\s+)?(?:\w+\s*[=:]\s*)?(?:async\s+)?\([^)]*\)\s*(?::\s*\S+)?\s*=>|\w+\s*\([^)]*\)\s*(?::\s*\S+)?\s*\{)',
              )
              brace_depth = 0
              func_start = None
              for i, line in enumerate(lines, 1):
                  brace_depth += line.count('{') - line.count('}')
                  if func_pattern.search(line) and brace_depth > 0 and func_start is None:
                      func_start = i
                  if func_start and brace_depth <= 0:
                      length = i - func_start + 1
                      if length > MAX_LINES_SDK_UI:
                          violations.append(f"{path}:{func_start}: function is {length} lines (max {MAX_LINES_SDK_UI})")
                      func_start = None

          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('node_modules', 'dist', 'build', 'coverage', '.git')]
              for fname in files:
                  if fname.endswith(('.ts', '.tsx')) and not fname.endswith('.d.ts'):
                      check_ts_file(os.path.join(root, fname))

          if violations:
              for v in violations[:20]:
                  print(f"::warning::{v}")
              print(f"\n{len(violations)} quality violation(s) found.")
          else:
              print("All TypeScript files pass complexity and length checks.")
          EOF

      - name: Check Rust file length
        run: |
          python3 << 'EOF'
          import os, sys

          MAX_FILE_LINES = int(os.environ.get('MAX_FILE_LINES_CONTRACT', 500))
          MAX_FN_LINES = int(os.environ.get('MAX_LINES_CONTRACT', 100))

          violations = []

          for root, dirs, files in os.walk('src'):
              for fname in files:
                  if not fname.endswith('.rs'):
                      continue
                  path = os.path.join(root, fname)
                  with open(path, encoding='utf-8', errors='ignore') as f:
                      lines = f.readlines()
                  if len(lines) > MAX_FILE_LINES:
                      violations.append(f"{path}: {len(lines)} lines (max {MAX_FILE_LINES})")

          if violations:
              for v in violations:
                  print(f"::warning::{v}")
          else:
              print("All Rust files pass file-length check.")
          EOF

      - name: Generate complexity report
        if: always()
        run: |
          echo "# Code Quality Report — $(date -u '+%Y-%m-%d %H:%M UTC')" > quality-report.md
          echo "" >> quality-report.md
          echo "## Thresholds" >> quality-report.md
          echo "" >> quality-report.md
          echo "| Metric | Threshold |" >> quality-report.md
          echo "|---|---|" >> quality-report.md
          echo "| SDK coverage | ${COVERAGE_SDK}% |" >> quality-report.md
          echo "| UI coverage | ${COVERAGE_UI}% |" >> quality-report.md
          echo "| Contracts coverage | ${COVERAGE_CONTRACTS}% |" >> quality-report.md
          echo "| Max cyclomatic complexity | ${MAX_COMPLEXITY} |" >> quality-report.md
          echo "| Max function length (contracts) | ${MAX_LINES_CONTRACT} lines |" >> quality-report.md
          echo "| Max function length (SDK/UI) | ${MAX_LINES_SDK_UI} lines |" >> quality-report.md
          echo "| Max file length (contracts) | ${MAX_FILE_LINES_CONTRACT} lines |" >> quality-report.md
          echo "| Max file length (SDK/UI) | ${MAX_FILE_LINES_SDK_UI} lines |" >> quality-report.md
          echo "" >> quality-report.md
          echo "See CI job logs for per-file details." >> quality-report.md

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-report
          path: quality-report.md
          retention-days: 30

      - name: Post quality summary on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: quality-report
          path: quality-report.md
